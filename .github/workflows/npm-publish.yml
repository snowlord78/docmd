name: docmd Release to NPM
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v6

      # Install exact pnpm version (matches package.json)
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # Setup Node.js with pnpm cache
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      
      - name: Upgrade npm (required for OIDC)
        run: npm install -g npm@latest

      # Verify versions (debug safety)
      - name: Verify versions
        run: |
          node -v
          npm -v
          pnpm -v

      # Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build all packages
      - name: Build packages
        run: pnpm -r run build

      # Run failsafe verification
      - name: Run verification
        run: pnpm verify --skip-setup

      # Copy LICENSE into each package
      - name: Copy LICENSE
        run: |
          find packages -mindepth 1 -maxdepth 2 -name "package.json" -exec dirname {} \; | xargs -I % cp LICENSE %

      # Resolve workspace dependencies
      - name: Resolve workspace dependencies
        run: node scripts/resolve-ws-deps.js

      # Publish to npm (OIDC trusted publishing)
      - name: Publish to npm
        run: |
          for dir in packages/* packages/plugins/*; do
            if [ -f "$dir/package.json" ]; then
              echo "Publishing $dir..."
              exit_code=0
              publish_output=$(npm publish "./$dir" --access public 2>&1) || exit_code=$?
              
              if [ $exit_code -ne 0 ]; then
                if echo "$publish_output" | grep -q 'previously published versions\|EPRIVATE'; then
                  echo "::notice::Skipping $dir: Already published or private."
                else
                  echo "::error::Failed to publish $dir"
                  echo "$publish_output"
                  exit 1
                fi
              fi
            fi
          done